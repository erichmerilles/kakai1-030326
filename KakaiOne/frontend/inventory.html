<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Inventory Logistics (Stockman View)</span>
            <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <div class="container">
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm mb-4">
            <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">📦 Wholesale Inventory (Boxes)</h5>
                <button class="btn btn-light btn-sm">Receive Shipment</button>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product Name</th>
                            <th>Boxes in Stock</th>
                            <th>Units per Box</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="wholesaleTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header bg-success text-white">
                <h5 class="mb-0">🏷️ Retail Warehouse (Pieces)</h5>
            </div>
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>SKU</th>
                            <th>Product Name</th>
                            <th>Pieces in Stock</th>
                        </tr>
                    </thead>
                    <tbody id="retailTableBody">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="assets/js/inventory.js"></script>
</body>

</html>
