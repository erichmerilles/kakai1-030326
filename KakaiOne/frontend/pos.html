<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Point of Sale (POS)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Point of Sale (Cashier)</span>
            <div>
                <a href="inventory.html" class="btn btn-outline-light btn-sm me-2">Inventory</a>
                <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div id="alertBox" class="alert d-none" role="alert"></div>

        <div class="row">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-secondary text-white">
                        <h5 class="mb-0">Retail Items Available</h5>
                    </div>
                    <div class="card-body">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>SKU</th>
                                    <th>Product</th>
                                    <th>Price</th>
                                    <th>Stock</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="productList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card shadow-sm border-primary">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Current Cart</h5>
                    </div>
                    <div class="card-body">
                        <ul id="cartList" class="list-group mb-3">
                        </ul>
                        <div class="d-flex justify-content-between mb-3 fs-5 fw-bold">
                            <span>Total:</span>
                            <span id="cartTotal">₱0.00</span>
                        </div>
                        <button class="btn btn-success w-100 py-2 fs-5" onclick="processCheckout()">
                            Complete Sale
                        </button>
                        <button class="btn btn-outline-danger w-100 mt-2" onclick="clearCart()">
                            Clear Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/pos.js"></script>
</body>

</html>
